name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install — hash-verified
        run: pip install --require-hashes -r requirements.txt

      - name: Install pytest
        # pytest ei ole requirements.txt:ssä (dev-riippuvuus), asennetaan erikseen
        # viralliselta PyPI:ltä ilman peilejä
        run: pip install pytest

      - name: Test
        run: pytest tests/ -v
